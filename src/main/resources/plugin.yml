name: BorderedSMP
description: $description
version: '${version}'

main: com.github.Glatinis.borderedSMP.BorderedSMP
api-version: '26.1.2'
load: POSTWORLD

authors: [ Glatinis ]

commands:
  lives:
    description: Manage player lives
    permission: borderedsmp.admin
    usage: /lives <set|add|remove|check> <player> [amount]
  border:
    description: Manage world border settings
    permission: borderedsmp.admin
    usage: /border setrange <min> <max>
  revive:
    description: Manage the revive system
    permission: borderedsmp.admin
    usage: /revive <toggle|reload>
